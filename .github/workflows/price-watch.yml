name: price-watch

on:
  schedule:
    # 毎日 UTC 21:00 = 日本時間 翌6:00 に1回だけ実行(低頻度・行儀よく)
    - cron: "0 21 * * *"
  workflow_dispatch: {}  # 手動実行を可能に

permissions:
  contents: write  # スナップショットのコミットに必要

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run price watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watch_prices.py

      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "chore: update pricing page snapshots [skip ci]"
            git push
          else
            echo "スナップショットに変更なし"
          fi
